<svg width="100%" viewBox="0 0 680 980" role="img" xmlns="http://www.w3.org/2000/svg">
<title>New Driver Mode System Map</title>
<desc>System map showing entry, monitoring, trigger logic, and post-drive flow for New Driver Mode</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Section label: Entry -->
<text font-family="system-ui, sans-serif" font-size="12" x="40" y="32" fill="#888780">01 — Entry</text>

<!-- Driver gets in car -->
<rect x="220" y="44" width="240" height="40" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="14" font-weight="500" x="340" y="64" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Driver gets in car</text>

<line x1="340" y1="84" x2="340" y2="104" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Selects profile -->
<rect x="200" y="104" width="280" height="40" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="14" font-weight="500" x="340" y="124" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Selects profile on infotainment</text>

<line x1="340" y1="144" x2="340" y2="172" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Diamond decision -->
<polygon points="340,172 400,200 340,228 280,200" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text font-family="system-ui, sans-serif" font-size="14" font-weight="500" x="340" y="200" text-anchor="middle" dominant-baseline="central" fill="#0C447C">First time?</text>

<!-- Yes branch -->
<line x1="280" y1="200" x2="170" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="system-ui, sans-serif" font-size="12" x="223" y="194" text-anchor="middle" fill="#888780">Yes</text>
<rect x="50" y="180" width="120" height="40" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="110" y="193" text-anchor="middle" dominant-baseline="central" fill="#085041">Onboarding</text>
<text font-family="system-ui, sans-serif" font-size="11" x="110" y="210" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">screen</text>

<!-- No branch -->
<line x1="400" y1="200" x2="490" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="system-ui, sans-serif" font-size="12" x="443" y="194" text-anchor="middle" fill="#888780">No</text>
<rect x="490" y="180" width="140" height="40" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="560" y="193" text-anchor="middle" dominant-baseline="central" fill="#085041">Mode indicator</text>
<text font-family="system-ui, sans-serif" font-size="11" x="560" y="210" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">on instrument cluster</text>

<!-- Divider -->
<line x1="40" y1="244" x2="640" y2="244" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Monitoring section -->
<text font-family="system-ui, sans-serif" font-size="12" x="40" y="268" fill="#888780">02 — Monitoring layer (silent, always running)</text>
<rect x="40" y="280" width="600" height="76" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="6 4"/>
<text font-family="system-ui, sans-serif" font-size="12" x="100" y="304" fill="#888780">· Speed and acceleration</text>
<text font-family="system-ui, sans-serif" font-size="12" x="100" y="322" fill="#888780">· Lane position and steering input</text>
<text font-family="system-ui, sans-serif" font-size="12" x="360" y="304" fill="#888780">· Location context (ramp, parking zone)</text>
<text font-family="system-ui, sans-serif" font-size="12" x="360" y="322" fill="#888780">· Confidence history per driver profile</text>
<text font-family="system-ui, sans-serif" font-size="12" x="100" y="344" fill="#888780">· Turn signal activation</text>

<line x1="340" y1="356" x2="340" y2="376" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Divider -->
<line x1="40" y1="392" x2="640" y2="392" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Trigger Logic -->
<text font-family="system-ui, sans-serif" font-size="12" x="40" y="414" fill="#888780">03 — Trigger logic</text>

<!-- Path headers -->
<rect x="40" y="424" width="160" height="36" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="120" y="442" text-anchor="middle" dominant-baseline="central" fill="#633806">Path 1 — Highway</text>

<rect x="260" y="424" width="160" height="36" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="340" y="442" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Path 2 — Parking</text>

<rect x="480" y="424" width="160" height="36" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="560" y="435" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Path 3 — Other</text>
<text font-family="system-ui, sans-serif" font-size="11" x="560" y="452" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">contexts</text>

<!-- Path 1 flow -->
<line x1="120" y1="460" x2="120" y2="480" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="480" width="160" height="36" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="120" y="498" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Ramp detected</text>

<line x1="120" y1="516" x2="120" y2="536" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="536" width="160" height="36" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="120" y="554" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Speed drop</text>

<line x1="120" y1="572" x2="120" y2="592" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="592" width="160" height="36" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="120" y="610" text-anchor="middle" dominant-baseline="central" fill="#633806">HUD activates</text>

<line x1="120" y1="628" x2="120" y2="648" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="648" width="160" height="36" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="120" y="666" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Merge guidance</text>

<line x1="120" y1="684" x2="120" y2="704" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="704" width="160" height="36" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="120" y="722" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">HUD fades</text>

<line x1="120" y1="740" x2="120" y2="760" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="760" width="160" height="36" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="120" y="778" text-anchor="middle" dominant-baseline="central" fill="#085041">Confidence +1</text>

<!-- Path 2 flow -->
<line x1="340" y1="460" x2="340" y2="480" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="260" y="480" width="160" height="36" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="340" y="498" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Reverse gear</text>

<line x1="340" y1="516" x2="340" y2="536" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="260" y="536" width="160" height="36" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="340" y="554" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Speed below 10mph</text>

<line x1="340" y1="572" x2="340" y2="592" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="260" y="592" width="160" height="36" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="340" y="610" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Infotainment overlay</text>

<line x1="340" y1="628" x2="340" y2="648" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="260" y="648" width="160" height="36" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="340" y="666" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Parking guidance</text>

<line x1="340" y1="684" x2="340" y2="704" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="260" y="704" width="160" height="36" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="340" y="722" text-anchor="middle" dominant-baseline="central" fill="#085041">Confidence +1</text>

<!-- Path 3 flow -->
<line x1="560" y1="460" x2="560" y2="480" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="480" y="480" width="160" height="56" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="560" y="499" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">System monitors</text>
<text font-family="system-ui, sans-serif" font-size="11" x="560" y="518" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">activates as needed</text>

<!-- Divider -->
<line x1="40" y1="820" x2="640" y2="820" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Post drive -->
<text font-family="system-ui, sans-serif" font-size="12" x="40" y="842" fill="#888780">04 — Post drive</text>

<rect x="240" y="854" width="200" height="36" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="340" y="872" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Car parked</text>

<line x1="340" y1="890" x2="340" y2="902" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="902" width="320" height="36" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" x="340" y="920" text-anchor="middle" dominant-baseline="central" fill="#085041">Drive summary on infotainment</text>

<!-- Footnote -->
<text font-family="system-ui, sans-serif" font-size="11" x="340" y="968" text-anchor="middle" fill="#888780">Paths shown represent primary high-anxiety scenarios. Monitoring runs continuously across all driving contexts.</text>

</svg>
